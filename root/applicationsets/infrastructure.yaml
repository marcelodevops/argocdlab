apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd

spec:
  generators:
  - list:
      elements:
      - name: ingress-nginx
        namespace: ingress-nginx
        chart: ingress-nginx
        repoURL: https://kubernetes.github.io/ingress-nginx
        version: 4.12.0

      - name: cert-manager
        namespace: cert-manager
        chart: cert-manager
        repoURL: https://charts.jetstack.io
        version: v1.18.0

      - name: rancher
        namespace: cattle-system
        chart: rancher
        repoURL: https://releases.rancher.com/server-charts/latest
        version: 2.11.2

      - name: opentelemetry
        namespace: observability
        chart: opentelemetry-collector
        repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
        version: 0.126.0

  template:
    metadata:
      name: '{{name}}'

    spec:
      project: default

      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{version}}'

        helm:
          valueFiles:
            - values.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
