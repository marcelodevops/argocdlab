apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-secret
  namespace: myapp
spec:
  refreshInterval: 1m

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: database-secret
    creationPolicy: Owner

  data:
    - secretKey: username
      remoteRef:
        key: myapp/database
        property: username

    - secretKey: password
      remoteRef:
        key: myapp/database
        property: password
